<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <h2>Open an Account</h2>
    <span class="subtitle">Ledger Data Backend</span>

    <label for="newUser" style="text-align:left;">Username</label>
    <input type="text" id="newUser" placeholder="Choose a username">

    <label for="email" style="text-align:left;">Email</label>
    <input type="email" id="email" placeholder="you@example.com">

    <label for="newPass" style="text-align:left;">Password</label>
    <input type="password" id="newPass" placeholder="Choose a password">

    <button onclick="register()">Register</button>
    <p id="msg"></p>

    <p>Already registered? <a href="login.html">Log in</a></p>
  </div>

<script src="script.js"></script>
</body>
</html>
