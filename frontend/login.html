<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <h2>Ledger</h2>
    <span class="subtitle">Data Backend Login</span>

    <label for="username" style="text-align:left;">Username</label>
    <input type="text" id="username" placeholder="Enter username">

    <label for="password" style="text-align:left;">Password</label>
    <input type="password" id="password" placeholder="Enter password">

    <button onclick="login()">Log In</button>
    <p id="msg"></p>

    <p>New here? <a href="registration.html">Create an account</a></p>
  </div>

<script src="script.js"></script>
</body>
</html>
